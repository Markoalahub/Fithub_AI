framework: spring_boot
name: "Spring Boot Backend Development Pipeline"
description: "Spring Boot 기반 백엔드 개발 파이프라인 (12단계)"
tech_stack:
  - Java 17+
  - Spring Boot 3.x
  - Spring Data JPA
  - H2/PostgreSQL
  - Lombok
  - Maven/Gradle

stages:
  - order: 1
    title: "환경 설정"
    description: "Spring Initializr, 의존성(Web, JPA, Lombok, H2), 빌드 환경 확인"
    key_points:
      - "Spring Boot 3.x 이상 선택"
      - "의존성: Spring Web, Spring Data JPA, Lombok, H2 Database (개발용)"
      - "빌드 도구: Maven 또는 Gradle"
      - "Java 버전 17 이상 확인"

  - order: 2
    title: "폴더 구조"
    description: "DDD 기반 아키텍처, 도메인별 패키지(Controller, Service, DTO, Repository) 분리"
    key_points:
      - "Domain-Driven Design 원칙 적용"
      - "도메인별 패키지: controller, service, dto, repository, entity, exception"
      - "공통 패키지: config, util, exception (global)"
      - "테스트 디렉토리 구조 정렬"

  - order: 3
    title: "데이터 모델링"
    description: "개념·논리·물리 설계, 원시 데이터 유형 결정 및 DB 스키마 확정"
    key_points:
      - "Entity 다이어그램 작성 (개념 설계)"
      - "정규화 및 관계 설계 (논리 설계)"
      - "테이블, 컬럼, 타입 최종 결정 (물리 설계)"
      - "스키마 DDL 검토"

  - order: 4
    title: "도메인 구현"
    description: "Entity 클래스 생성, 연관 관계 매핑, 객체별 고유 비즈니스 동작 정의"
    key_points:
      - "@Entity, @Table, @Column 어노테이션 적용"
      - "@OneToMany, @ManyToOne, @OneToOne 등 관계 매핑"
      - "equals, hashCode, toString 구현 또는 Lombok 활용"
      - "Entity별 비즈니스 메서드 정의 (도메인 로직)"

  - order: 5
    title: "데이터 접근 레이어"
    description: "Spring Data JPA Repository 상속 및 커스텀 쿼리 메서드 정의"
    key_points:
      - "JpaRepository 상속한 Repository 인터페이스 작성"
      - "findBy*, save*, delete* 등 메서드 네이밍으로 자동 생성"
      - "복잡한 쿼리는 @Query(JPQL) 또는 QueryDSL 활용"
      - "Pagination, Sorting 지원"

  - order: 6
    title: "API 스펙 설계"
    description: "DTO 정의, 입력 데이터 유효성 검사(Validation), 프론트엔드와 인터페이스 공유"
    key_points:
      - "Request DTO, Response DTO 설계"
      - "@Valid, @NotNull, @Size 등 Validation 어노테이션"
      - "API 문서화 (Swagger/Springdoc-openapi)"
      - "프론트엔드 팀과 인터페이스 정의서 공유"

  - order: 7
    title: "비즈니스 로직"
    description: "Service 클래스 구현, 도메인 로직 처리, 외부 API 서버 연동"
    key_points:
      - "@Service, @Transactional 어노테이션 적용"
      - "Repository를 이용한 데이터 조회/저장"
      - "도메인 비즈니스 로직 구현"
      - "외부 API 연동 시 RestTemplate 또는 WebClient 활용"

  - order: 8
    title: "예외 처리 전략"
    description: "글로벌 예외 처리기(ControllerAdvice), 커스텀 예외 클래스 설계"
    key_points:
      - "커스텀 Exception 클래스 정의 (예: BusinessException, ResourceNotFoundException)"
      - "@ControllerAdvice, @ExceptionHandler 글로벌 처리"
      - "HTTP 상태 코드 매핑 (400, 404, 500 등)"
      - "Error Response DTO 표준화"

  - order: 9
    title: "컨트롤러 및 매핑"
    description: "API 엔드포인트 노출, 서비스 로직 연결, HTTP 메서드 및 경로 매핑"
    key_points:
      - "@RestController, @RequestMapping 설정"
      - "@GetMapping, @PostMapping, @PutMapping, @DeleteMapping 구현"
      - "@PathVariable, @RequestParam, @RequestBody 처리"
      - "Service 호출 및 응답 변환"

  - order: 10
    title: "검증 및 테스트"
    description: "JUnit/AssertJ 기반 단위 테스트, 테스트 커버리지 관리, 통합 테스트"
    key_points:
      - "JUnit 5 기반 테스트 케이스 작성"
      - "Repository, Service, Controller 계층별 테스트"
      - "@SpringBootTest, @DataJpaTest 활용"
      - "테스트 커버리지 80% 이상 목표"

  - order: 11
    title: "CI/CD 파이프라인"
    description: "GitHub Actions를 통한 빌드 자동화, Docker 이미지 빌드 및 운영 서버(EC2) 배포"
    key_points:
      - "GitHub Actions 워크플로우 파일 (.github/workflows/*.yml)"
      - "Maven/Gradle 빌드 자동화"
      - "Docker 이미지 빌드 및 푸시"
      - "AWS EC2 배포 자동화 (SSH, docker-compose 등)"

  - order: 12
    title: "모니터링 및 로깅"
    description: "Prometheus를 이용한 메트릭 수집, Grafana 대시보드 시각화, 로그 추적 관리"
    key_points:
      - "SLF4J + Logback 설정"
      - "Structured logging (JSON 포맷)"
      - "Prometheus Micrometer 통합"
      - "Grafana 대시보드 구성"
      - "ELK Stack 또는 CloudWatch 로그 관리"
